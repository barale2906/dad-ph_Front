<div class="barcodes-print">
  <a routerLink="/asistentes" class="back-link">← Volver a asistentes</a>

  <h1 class="page-title">Generar códigos de barras</h1>
  <p class="page-desc">
    El backend generará un PDF con los códigos de barras para imprimir.
  </p>

  <form [formGroup]="form" (ngSubmit)="onSubmit()" class="form-card panel-hud">
    @if (errorMessage) {
      <div class="alert alert-error">{{ errorMessage }}</div>
    }

    <div class="form-row">
      <div class="form-group">
        <label>Inicio (número)</label>
        <input formControlName="inicio" type="number" min="1" class="input" />
      </div>
      <div class="form-group">
        <label>Cantidad</label>
        <input formControlName="cantidad" type="number" min="1" class="input" />
      </div>
      <div class="form-group">
        <label>Repeticiones</label>
        <input formControlName="repeticiones" type="number" min="1" class="input" />
      </div>
    </div>

    <button type="submit" class="btn btn-primary" [disabled]="form.invalid || loading">
      {{ loading ? 'Generando...' : 'Descargar PDF' }}
    </button>
  </form>
</div>
