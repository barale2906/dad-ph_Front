<div class="login-page">
  <div class="login-card panel-hud">
    <div class="login-card__header">
      <h1 class="login-card__title">UniPH</h1>
      <p class="login-card__subtitle">Iniciar sesión</p>
    </div>

    <form
    role="form"
    aria-label="Inicio de sesión" [formGroup]="form" (ngSubmit)="onSubmit()" class="login-form">
      @if (errorMessage) {
        <div class="alert alert-error">{{ errorMessage }}</div>
      }

      <div class="form-group">
        <label for="email">Correo electrónico</label>
        <input
          id="email"
          type="email"
          formControlName="email"
          placeholder="admin&#64;ejemplo.com"
          class="input"
          autocomplete="email"
        />
        @if (form.get('email')?.invalid && form.get('email')?.touched) {
          <span class="form-error">Ingrese un correo válido</span>
        }
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <input
          id="password"
          type="password"
          formControlName="password"
          placeholder="••••••••"
          class="input"
          autocomplete="current-password"
        />
        @if (form.get('password')?.invalid && form.get('password')?.touched) {
          <span class="form-error">La contraseña es requerida</span>
        }
      </div>

      <button
        type="submit"
        class="btn btn-primary"
        [disabled]="form.invalid || loading"
      >
        {{ loading ? 'Conectando...' : 'Entrar' }}
      </button>
    </form>
  </div>
</div>
